<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#2AABEE" />
    <title>Connect with Telegram</title>

    <!--
      IMPORTANT: The Telegram WebApp script MUST be loaded first before any
      other scripts. It initializes window.Telegram.WebApp with user data
      when the app is opened inside a Telegram bot.
    -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div id="app">
      <!-- Loading state shown before JS initializes -->
      <div id="initial-loader" style="
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #F0F2F5;
      ">
        <div style="text-align: center;">
          <div style="
            width: 64px;
            height: 64px;
            background: #2AABEE;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            animation: pulse 1.5s ease-in-out infinite;
          ">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="38" height="38" fill="white">
              <path d="M24 4C12.95 4 4 12.95 4 24s8.95 20 20 20 20-8.95 20-20S35.05 4 24 4zm9.72 13.67l-3.35 15.79c-.25 1.11-.91 1.38-1.85.86l-5.1-3.76-2.46 2.37c-.27.27-.5.5-1.03.5l.37-5.21 9.49-8.57c.41-.37-.09-.57-.64-.2L14.25 30.97l-5.05-1.58c-1.1-.34-1.12-1.1.23-1.63l19.75-7.61c.91-.34 1.71.22 1.54 1.52z"/>
            </svg>
          </div>
          <p style="color: #8E8E93; font-family: -apple-system, sans-serif; font-size: 14px;">Loading...</p>
        </div>
      </div>
    </div>

    <style>
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(0.95); opacity: 0.8; }
      }
    </style>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
